<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Galaga</title>
<style>
  html, body {
    margin: 0; padding: 0;
    background: #000;
    color: #fff;
    font-family: 'Courier New', monospace;
    overflow: hidden;
    height: 100%;
    width: 100%;
    user-select: none;
  }
  #wrap {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh;
  }
  canvas {
    background: #000;
    border: 2px solid #222;
    image-rendering: pixelated;
    box-shadow: 0 0 30px rgba(100,150,255,0.3);
  }
  #info {
    margin-top: 8px;
    font-size: 12px;
    color: #888;
    text-align: center;
  }
  #info b { color: #6cf; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game" width="480" height="640"></canvas>
  <div id="info">
    이동: <b>← →</b> 또는 <b>A D</b> &nbsp;|&nbsp; 발사: <b>스페이스</b> &nbsp;|&nbsp; 재시작: <b>R</b>
  </div>
</div>
<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  const keys = {};
  addEventListener('keydown', e => {
    keys[e.code] = true;
    if (['ArrowLeft','ArrowRight','Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
    if (e.code === 'KeyR' && (state === 'gameover' || state === 'win')) reset();
  });
  addEventListener('keyup', e => { keys[e.code] = false; });

  // Stars background
  const stars = Array.from({length: 80}, () => ({
    x: Math.random() * W,
    y: Math.random() * H,
    s: Math.random() * 1.5 + 0.3,
    v: Math.random() * 0.8 + 0.2
  }));

  let player, bullets, enemies, enemyBullets, particles;
  let score, lives, wave, state, stateTimer;
  let enemyDir, enemyStepTimer, divers;

  function reset() {
    player = { x: W/2, y: H - 50, w: 28, h: 20, cooldown: 0, invuln: 0 };
    bullets = [];
    enemyBullets = [];
    particles = [];
    score = 0;
    lives = 3;
    wave = 1;
    state = 'play';
    stateTimer = 0;
    spawnWave();
  }

  function spawnWave() {
    enemies = [];
    divers = [];
    const rows = 4, cols = 8;
    const startX = 60, startY = 70;
    const gapX = 45, gapY = 40;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const type = r === 0 ? 'boss' : (r === 1 ? 'butterfly' : 'bee');
        enemies.push({
          x: startX + c * gapX,
          y: startY + r * gapY,
          homeX: startX + c * gapX,
          homeY: startY + r * gapY,
          w: 24, h: 20,
          type,
          shootCD: Math.random() * 200 + 100,
          diving: false,
          divePhase: 0,
          diveT: 0
        });
      }
    }
    enemyDir = 1;
    enemyStepTimer = 0;
  }

  function shoot() {
    bullets.push({ x: player.x, y: player.y - 10, vy: -8 });
    if (bullets.length > 4) bullets.shift(); // classic galaga limit feel
  }

  function explode(x, y, color) {
    for (let i = 0; i < 16; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = Math.random() * 3 + 1;
      particles.push({
        x, y,
        vx: Math.cos(a) * s,
        vy: Math.sin(a) * s,
        life: 30,
        color
      });
    }
  }

  function rectsHit(a, b) {
    return Math.abs(a.x - b.x) < (a.w + b.w) / 2 &&
           Math.abs(a.y - b.y) < (a.h + b.h) / 2;
  }

  function update() {
    // stars
    stars.forEach(s => {
      s.y += s.v;
      if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    });

    if (state !== 'play') {
      stateTimer++;
      return;
    }

    // player movement
    const speed = 4.5;
    if (keys['ArrowLeft'] || keys['KeyA']) player.x -= speed;
    if (keys['ArrowRight'] || keys['KeyD']) player.x += speed;
    player.x = Math.max(20, Math.min(W - 20, player.x));

    if (player.cooldown > 0) player.cooldown--;
    if (player.invuln > 0) player.invuln--;
    if (keys['Space'] && player.cooldown <= 0) {
      shoot();
      player.cooldown = 12;
    }

    // bullets
    bullets.forEach(b => b.y += b.vy);
    bullets = bullets.filter(b => b.y > -10);

    // enemy formation movement
    enemyStepTimer++;
    const formationEnemies = enemies.filter(e => !e.diving);
    if (formationEnemies.length > 0) {
      let minX = Infinity, maxX = -Infinity;
      formationEnemies.forEach(e => {
        minX = Math.min(minX, e.homeX);
        maxX = Math.max(maxX, e.homeX);
      });
      const drift = Math.sin(stateTimer * 0.01 + enemyStepTimer * 0.005) * 30;
      enemies.forEach(e => {
        if (!e.diving) {
          e.x = e.homeX + drift;
          e.y = e.homeY;
        }
      });
    }

    // dive attacks
    enemies.forEach(e => {
      // dive frequency ramps up each wave; first ~1.5s of a wave is a grace period
      if (!e.diving && enemyStepTimer > 90 &&
          Math.random() < 0.0002 + (wave - 1) * 0.0004) {
        e.diving = true;
        e.diveT = 0;
        e.diveTargetX = player.x;
      }
      if (e.diving) {
        e.diveT += 0.02;
        const t = e.diveT;
        e.x += Math.sin(t * 4) * 2;
        e.y += 2.2 + (wave - 1) * 0.45;
        if (e.y > H + 30) {
          e.diving = false;
          e.y = -30;
          e.diveT = 0;
          // reappear at home next frame
          e.y = e.homeY;
        }
      }

      // shooting: rarer & slower early, more frequent & faster each wave
      e.shootCD--;
      if (e.shootCD <= 0 && Math.random() < 0.12 + (wave - 1) * 0.06) {
        enemyBullets.push({ x: e.x, y: e.y + 10, vy: 2.2 + (wave - 1) * 0.45 });
        e.shootCD = (240 - wave * 20) + Math.random() * (240 - wave * 20);
      }
    });

    // enemy bullets
    enemyBullets.forEach(b => b.y += b.vy);
    enemyBullets = enemyBullets.filter(b => b.y < H + 10);

    // collisions: player bullets vs enemies
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (rectsHit({x: b.x, y: b.y, w: 4, h: 8}, e)) {
          const color = e.type === 'boss' ? '#f4f' : (e.type === 'butterfly' ? '#ff4' : '#4af');
          explode(e.x, e.y, color);
          score += e.type === 'boss' ? 150 : (e.type === 'butterfly' ? 80 : 50);
          if (e.diving) score *= 1; // bonus could go here
          enemies.splice(j, 1);
          bullets.splice(i, 1);
          break;
        }
      }
    }

    // enemy bullets vs player
    if (player.invuln <= 0) {
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const b = enemyBullets[i];
        if (rectsHit({x: b.x, y: b.y, w: 4, h: 8}, player)) {
          enemyBullets.splice(i, 1);
          hitPlayer();
          break;
        }
      }
      // diving enemies vs player
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (e.diving && rectsHit(e, player)) {
          explode(e.x, e.y, '#f80');
          enemies.splice(j, 1);
          hitPlayer();
          break;
        }
      }
    }

    // particles
    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.95;
      p.vy *= 0.95;
      p.life--;
    });
    particles = particles.filter(p => p.life > 0);

    // wave clear
    if (enemies.length === 0) {
      wave++;
      if (wave > 5) {
        state = 'win';
      } else {
        spawnWave();
      }
    }
  }

  function hitPlayer() {
    explode(player.x, player.y, '#fff');
    lives--;
    if (lives <= 0) {
      state = 'gameover';
    } else {
      player.x = W / 2;
      player.invuln = 120;
    }
  }

  // ---- drawing ----
  function drawShip(x, y, invuln) {
    ctx.save();
    ctx.translate(x, y);
    // 피격 후 무적 시간: 사라지지 않고 반투명으로 빠르게 깜빡이게 표현.
    // invuln 값이 매 프레임 줄어들므로 이를 위상으로 써서 부드럽게 점멸시킨다.
    if (invuln > 0) {
      const pulse = Math.sin(invuln * 0.4) * 0.5 + 0.5; // 0~1 진동
      ctx.globalAlpha = 0.25 + 0.5 * pulse;             // 0.25~0.75 사이로 반짝임
    }
    ctx.fillStyle = '#fff';
    // body
    ctx.fillRect(-2, -10, 4, 6);
    ctx.fillRect(-4, -6, 8, 4);
    ctx.fillStyle = '#d33';
    ctx.fillRect(-12, -2, 24, 4);
    ctx.fillRect(-14, 2, 28, 4);
    ctx.fillStyle = '#fff';
    ctx.fillRect(-6, 2, 12, 4);
    ctx.fillStyle = '#aaf';
    ctx.fillRect(-10, 6, 4, 4);
    ctx.fillRect(6, 6, 4, 4);
    ctx.restore();
  }

  function drawEnemy(e) {
    const x = e.x, y = e.y;
    ctx.save();
    ctx.translate(x, y);
    if (e.type === 'bee') {
      ctx.fillStyle = '#48f';
      ctx.fillRect(-8, -6, 16, 4);
      ctx.fillRect(-10, -2, 20, 6);
      ctx.fillStyle = '#fff';
      ctx.fillRect(-4, -4, 2, 2);
      ctx.fillRect(2, -4, 2, 2);
      ctx.fillStyle = '#fa0';
      ctx.fillRect(-6, 4, 4, 4);
      ctx.fillRect(2, 4, 4, 4);
    } else if (e.type === 'butterfly') {
      ctx.fillStyle = '#ff3';
      ctx.fillRect(-10, -4, 20, 4);
      ctx.fillRect(-6, -8, 12, 4);
      ctx.fillStyle = '#f44';
      ctx.fillRect(-12, 0, 6, 6);
      ctx.fillRect(6, 0, 6, 6);
      ctx.fillStyle = '#fff';
      ctx.fillRect(-2, -2, 4, 2);
    } else {
      // boss
      ctx.fillStyle = '#f3f';
      ctx.fillRect(-12, -6, 24, 4);
      ctx.fillRect(-10, -10, 20, 4);
      ctx.fillStyle = '#0f8';
      ctx.fillRect(-10, -2, 20, 6);
      ctx.fillStyle = '#fff';
      ctx.fillRect(-6, 0, 2, 2);
      ctx.fillRect(4, 0, 2, 2);
      ctx.fillStyle = '#f3f';
      ctx.fillRect(-12, 4, 24, 4);
    }
    ctx.restore();
  }

  function draw() {
    // bg
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, H);

    // stars
    stars.forEach(s => {
      ctx.fillStyle = `rgba(255,255,255,${s.v})`;
      ctx.fillRect(s.x, s.y, s.s, s.s);
    });

    // bullets
    ctx.fillStyle = '#fff';
    bullets.forEach(b => ctx.fillRect(b.x - 1, b.y - 6, 2, 8));
    ctx.fillStyle = '#f80';
    enemyBullets.forEach(b => ctx.fillRect(b.x - 1, b.y - 4, 2, 8));

    // enemies
    enemies.forEach(drawEnemy);

    // player
    if (state === 'play' || state === 'win') {
      drawShip(player.x, player.y, player.invuln);
    }

    // particles
    particles.forEach(p => {
      ctx.fillStyle = p.color;
      ctx.globalAlpha = p.life / 30;
      ctx.fillRect(p.x - 1, p.y - 1, 3, 3);
    });
    ctx.globalAlpha = 1;

    // HUD
    ctx.fillStyle = '#fff';
    ctx.font = '14px Courier New';
    ctx.textAlign = 'left';
    ctx.fillText('SCORE  ' + String(score).padStart(6, '0'), 10, 20);
    ctx.textAlign = 'right';
    ctx.fillText('WAVE ' + wave + '/5', W - 10, 20);

    // lives
    for (let i = 0; i < lives - 1; i++) {
      ctx.save();
      ctx.translate(20 + i * 24, H - 14);
      ctx.scale(0.55, 0.55);
      drawShip(0, 0, 0);
      ctx.restore();
    }

    if (state === 'gameover') {
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, H/2 - 60, W, 120);
      ctx.fillStyle = '#f44';
      ctx.font = 'bold 32px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('GAME OVER', W/2, H/2);
      ctx.fillStyle = '#fff';
      ctx.font = '14px Courier New';
      ctx.fillText('SCORE  ' + score + '   —   press R to restart', W/2, H/2 + 28);
    }
    if (state === 'win') {
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, H/2 - 60, W, 120);
      ctx.fillStyle = '#6f6';
      ctx.font = 'bold 28px Courier New';
      ctx.textAlign = 'center';
      ctx.fillText('STAGE CLEAR!', W/2, H/2);
      ctx.fillStyle = '#fff';
      ctx.font = '14px Courier New';
      ctx.fillText('FINAL SCORE  ' + score + '   —   press R to play again', W/2, H/2 + 28);
    }
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  reset();
  loop();
})();
</script>
</body>
</html>
